# ═══════════════════════════════════════════════════════════════
# streaming-auth — default configuration
# Non-secret defaults. Secrets live in .env only.
# Env vars override any value here (see src/config/config.loader.ts).
# ═══════════════════════════════════════════════════════════════

server:
  port: 3000
  bindIp: 0.0.0.0
  # HAProxy sits in front; trust the first proxy hop for req.ip
  trustProxy: 1
  # Max request body size
  bodyLimit: 16kb

cors:
  # CSV list or "*". Tighten in production.
  origins: "*"
  methods: "GET, POST, OPTIONS"
  headers: "Content-Type, Authorization"

sign:
  # Signed URL expiry bounds (seconds)
  minExpires: 60
  maxExpires: 3600
  defaultExpires: 600
  # Per-IP rate limit at app layer
  rateLimit:
    ttl: 60000   # ms
    limit: 120   # requests per ttl

streams:
  # Allowed stream name pattern (alphanum + _ -)
  nameRegex: "^[a-zA-Z0-9_-]{1,64}$"

bunny:
  # CDN URL (pull zone). Required for /sign to succeed.
  # Can also be set via env: BUNNY_CDN_URL
  cdnUrl: ""
  # tokenKey is a secret — set via env BUNNY_TOKEN_KEY only

publish:
  # RTMP publish endpoint (OBS target). Required for /sign/publish.
  # Can be overridden via env: PUBLISH_DOMAIN
  pushDomain: ""
  # RTMP app path component. Env: PUBLISH_APP
  app: "live"
  # Expiry bounds for txSecret tokens (seconds).
  # Long-lived by design — OBS setups shouldn't need daily re-mint.
  # Rotating PUBLISH_SIGN_KEY invalidates every outstanding URL at once.
  minExpires: 300          # 5 min
  maxExpires: 31536000     # 12 months
  defaultExpires: 2592000  # 30 days

  # Emit `url_rtmps` in /sign/publish responses. Only flip to true after
  # a Let's Encrypt cert is bound on rtmpsPort — the CF Origin Cert is
  # rejected by OBS. Env: PUBLISH_RTMPS_ENABLED.
  rtmpsEnabled: false
  rtmpsPort: 1936
  # signKey is a secret — set via env PUBLISH_SIGN_KEY only

origin:
  # SRS HTTP endpoint (used only for informational health reporting)
  host: ""
  port: 8080

logger:
  level: info
  # "pretty" for dev, "json" for prod (journald)
  format: json
